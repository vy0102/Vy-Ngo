<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Landing</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --dark: #0a0a0a;
      --white: #f5f2ed;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      overflow-x: hidden;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .bg-video.loaded { opacity: 1; }

    /* layered overlays for depth */
    .overlay-dark {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.45) 50%,
        rgba(0,0,0,0.75) 100%
      );
      z-index: 1;
    }

    .overlay-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      z-index: 2;
    }

    /* ── Nav ── */
    .nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 3rem;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-light);
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(245,242,237,0.7);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: var(--gold); }

    /* ── Hero content ── */
    .hero-content {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 0 2rem;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1.2s ease 0.5s forwards;
    }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.25rem;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 300;
      line-height: 1.0;
      letter-spacing: -1px;
      margin-bottom: 1.5rem;
      color: var(--white);
    }

    .hero-title span {
      font-style: italic;
      color: var(--gold-light);
    }

    .hero-subtitle {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 2px;
      color: rgba(245,242,237,0.65);
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
      padding-bottom: 4px;
      transition: color 0.3s, border-color 0.3s;
    }

    .hero-cta:hover { color: var(--gold); }

    .hero-cta::after {
      content: '→';
      font-size: 14px;
      transition: transform 0.3s;
    }

    .hero-cta:hover::after { transform: translateX(5px); }

    /* ── Scroll indicator ── */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fadeUp 1s ease 1.5s forwards;
    }

    .scroll-hint span {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(245,242,237,0.4);
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s ease infinite;
    }

    /* ── About strip ── */
    .strip {
      background: var(--dark);
      padding: 5rem 3rem;
      display: grid;
      grid-template-columns: 1fr 2px 1fr 2px 1fr;
      gap: 0;
      border-top: 1px solid rgba(201,169,110,0.2);
    }

    .strip-divider {
      background: rgba(201,169,110,0.2);
      align-self: stretch;
    }

    .strip-item {
      text-align: center;
      padding: 1rem 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .strip-item:nth-child(1) { animation-delay: 0.8s; }
    .strip-item:nth-child(3) { animation-delay: 1.0s; }
    .strip-item:nth-child(5) { animation-delay: 1.2s; }

    .strip-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .strip-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(245,242,237,0.5);
    }

    /* ── Footer ── */
    .footer {
      background: #050505;
      border-top: 1px solid rgba(201,169,110,0.15);
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(245,242,237,0.3);
      text-transform: uppercase;
    }

    .footer-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .footer-links a {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(245,242,237,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-links a:hover { color: var(--gold); }

    /* ── Profile photo ── */
    .profile-photo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 4px rgba(201,169,110,0.15), 0 8px 32px rgba(0,0,0,0.5);
      margin-bottom: 1.5rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.2); }
    }
  </style>
</head>
